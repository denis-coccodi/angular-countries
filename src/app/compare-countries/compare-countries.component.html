<app-p-multiselect
  [options]="countryOptions()"
  [virtualScrollItemSize]="45"
  [placeholder]="'Filter by country...'"
  (valueChange)="onCountrySelectionChange($event)"
/>

<div class="compare-countries-grid">
  <app-country-card
    *ngFor="let country of selectedCountries()"
    [country]="country"
  >
  </app-country-card>
</div>
