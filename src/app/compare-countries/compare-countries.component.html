<form [formGroup]="selectedCountriesForm" class="selected-countries-form">
  <label for="country-select">Select countries to compare</label>
  <app-p-multiselect
    inputId="country-select"
    ariaLabel="Select countries to compare"
    [options]="countryOptions()"
    placeholder="Select country..."
    [formControl]="selectionControl"
  />
</form>

<section class="compare-countries-grid" aria-label="Countries comparison">
  @for (country of selectedCountries(); track country.cca3) {
  <app-country-card
    [country]="country"
    [displayedInfo]="selectedProperties()"
  ></app-country-card>
  } @empty {
  <p role="status">Select countries above to start comparing</p>
  }
</section>
