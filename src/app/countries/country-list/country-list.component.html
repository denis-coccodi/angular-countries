<div class="country-list-page">
  <div class="filters-bar">
    <form [formGroup]="filterForm">
      <div class="filter-row">
        <div class="filter-item">
          <label for="search-input">Search</label>
          <app-p-input-text
            id="search-input"
            ariaLabel="Search countries"
            placeholder="Search countries..."
            formControlName="search">
          </app-p-input-text>
        </div>

        <div class="filter-item">
          <label for="region-select">Region</label>
          <app-p-dropdown
            id="region-select"
            [options]="regions"
            placeholder="All Regions"
            [showClear]="true"
            formControlName="region">
          </app-p-dropdown>
        </div>

        <div class="filter-item">
          <label for="sort-select">Sort by</label>
          <app-p-dropdown
            id="sort-select"
            [options]="sortOptions"
            optionLabel="label"
            optionValue="value"
            formControlName="sortBy">
          </app-p-dropdown>
        </div>

        <div class="filter-item">
          <button class="clear-btn" type="button" (click)="clearFilters()">Clear Filters</button>
        </div>
      </div>
    </form>
  </div>

  <div class="results-info" aria-live="polite" aria-atomic="true">
    <span>{{ filteredCountries().length }} countries found</span>
  </div>

  @if (!loading()) {
    <div class="country-grid" role="region" aria-label="Country list">
      @for (country of filteredCountries(); track country.cca3) {
        <app-country-card [country]="country"></app-country-card>
      }
    </div>
  }

  @if (loading()) {
    <div class="loading" role="status" aria-live="polite">
      <p>Loading countries...</p>
    </div>
  }
</div>
